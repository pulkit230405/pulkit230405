<svg width="800" height="280" viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
@keyframes floatA{0%,100%{transform:translateY(0px)}50%{transform:translateY(-14px)}}
@keyframes floatB{0%,100%{transform:translateY(0px)}50%{transform:translateY(11px)}}
@keyframes starBlink{0%,100%{opacity:0.12}50%{opacity:0.55}}
@keyframes gridFade{0%,100%{opacity:0.07}50%{opacity:0.24}}
@keyframes cornerPulse{0%,100%{opacity:0.35}50%{opacity:0.95}}
@keyframes namePulse{0%,100%{opacity:0.82}50%{opacity:1}}
@keyframes dotPing{0%,100%{opacity:0.45}50%{opacity:1}}
.oa{animation:floatA 3.6s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.ob{animation:floatB 4.3s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.oc{animation:floatA 5.1s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.od{animation:floatB 3.9s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.oe{animation:floatA 4.7s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.star{animation:starBlink ease-in-out infinite}
.gg{animation:gridFade 3.6s ease-in-out infinite}
.br{animation:cornerPulse 2.9s ease-in-out infinite}
.nt{animation:namePulse 3.2s ease-in-out infinite}
.dp{animation:dotPing 2s ease-in-out infinite}
</style>
<linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#050912"/>
  <stop offset="48%" stop-color="#0C0A22"/>
  <stop offset="100%" stop-color="#050912"/>
</linearGradient>
<linearGradient id="ng" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%" stop-color="#00E5FF"/>
  <stop offset="100%" stop-color="#A855F7"/>
</linearGradient>
<linearGradient id="scanG" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%" stop-color="#00E5FF" stop-opacity="0"/>
  <stop offset="50%" stop-color="#00E5FF" stop-opacity="0.055"/>
  <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
</linearGradient>
</defs>

<rect width="800" height="280" fill="url(#bgG)"/>

<g fill="#FFFFFF">
  <circle class="star" cx="70" cy="25" r="1" style="animation-duration:4.2s;animation-delay:0s;opacity:.28"/>
  <circle class="star" cx="158" cy="63" r="0.8" style="animation-duration:6.1s;animation-delay:1.1s;opacity:.2"/>
  <circle class="star" cx="238" cy="38" r="1.1" style="animation-duration:5s;animation-delay:2.2s;opacity:.25"/>
  <circle class="star" cx="328" cy="17" r="0.9" style="animation-duration:7s;animation-delay:0.5s;opacity:.18"/>
  <circle class="star" cx="498" cy="33" r="1" style="animation-duration:5.5s;animation-delay:1.6s;opacity:.22"/>
  <circle class="star" cx="598" cy="56" r="0.8" style="animation-duration:4.5s;animation-delay:3.1s;opacity:.28"/>
  <circle class="star" cx="692" cy="27" r="1.2" style="animation-duration:6s;animation-delay:0.9s;opacity:.18"/>
  <circle class="star" cx="755" cy="70" r="1" style="animation-duration:5.2s;animation-delay:2.5s;opacity:.15"/>
  <circle class="star" cx="96" cy="138" r="0.8" style="animation-duration:6.5s;animation-delay:1s;opacity:.13"/>
  <circle class="star" cx="285" cy="114" r="1" style="animation-duration:4s;animation-delay:2s;opacity:.16"/>
  <circle class="star" cx="560" cy="120" r="0.9" style="animation-duration:7.2s;animation-delay:0.6s;opacity:.18"/>
  <circle class="star" cx="728" cy="145" r="1.1" style="animation-duration:5.1s;animation-delay:1.8s;opacity:.13"/>
  <circle class="star" cx="46" cy="174" r="0.8" style="animation-duration:6.2s;animation-delay:3.2s;opacity:.11"/>
  <circle class="star" cx="348" cy="170" r="1" style="animation-duration:4.6s;animation-delay:0.4s;opacity:.14"/>
  <circle class="star" cx="655" cy="163" r="0.9" style="animation-duration:5.6s;animation-delay:2.1s;opacity:.16"/>
</g>

<circle class="oa" cx="78" cy="52" r="6" fill="#00E5FF" opacity="0.32" style="animation-delay:0s"/>
<circle class="ob" cx="722" cy="72" r="8" fill="#A855F7" opacity="0.22" style="animation-delay:0.5s"/>
<circle class="oc" cx="400" cy="27" r="4" fill="#F59E0B" opacity="0.28" style="animation-delay:1s"/>
<circle class="od" cx="156" cy="150" r="5" fill="#A855F7" opacity="0.18" style="animation-delay:1.5s"/>
<circle class="oe" cx="650" cy="147" r="6" fill="#00E5FF" opacity="0.2" style="animation-delay:0.8s"/>

<g class="gg" stroke="#00E5FF" stroke-width="0.5" fill="none">
  <line x1="400" y1="190" x2="0" y2="280"/>
  <line x1="400" y1="190" x2="133" y2="280"/>
  <line x1="400" y1="190" x2="267" y2="280"/>
  <line x1="400" y1="190" x2="400" y2="280"/>
  <line x1="400" y1="190" x2="533" y2="280"/>
  <line x1="400" y1="190" x2="667" y2="280"/>
  <line x1="400" y1="190" x2="800" y2="280"/>
  <line x1="311" y1="212" x2="489" y2="212"/>
  <line x1="200" y1="235" x2="600" y2="235"/>
  <line x1="102" y1="257" x2="698" y2="257"/>
  <line x1="0" y1="280" x2="800" y2="280"/>
</g>

<g class="br" stroke="#00E5FF" stroke-width="1.8" fill="none">
  <polyline points="22,22 22,50 50,50"/>
  <polyline points="778,22 778,50 750,50"/>
  <polyline points="22,258 22,230 50,230"/>
  <polyline points="778,258 778,230 750,230"/>
</g>

<rect x="-120" y="0" width="120" height="280" fill="url(#scanG)">
  <animateTransform attributeName="transform" type="translate" values="0,0;1040,0" dur="9s" repeatCount="indefinite" calcMode="linear"/>
</rect>

<text x="400" y="126" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="58" font-weight="700" fill="url(#ng)" class="nt">PULKIT JAIN</text>
<text x="400" y="158" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="11" fill="#94A3B8" letter-spacing="3.8">AI ENGINEER  ·  MEDICAL VISION  ·  GRAPH NEURAL NETWORKS</text>
<line x1="250" y1="176" x2="550" y2="176" stroke="#00E5FF" stroke-width="0.5" opacity="0.38"/>

<circle class="dp" cx="293" cy="196" r="3.5" fill="#10B981"/>
<text x="305" y="200" font-family="'Courier New',Courier,monospace" font-size="11" fill="#10B981">ONLINE</text>
<text x="462" y="200" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="11" fill="#475569">Gujarat, India</text>
</svg>
